<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rent a Pet - Graphics</title>

<style type="text/css">


	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
		width: 150px;
		height: 100px;
	}

			
	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image{
		height:500px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

	PrintButton1 = new Image;
	PrintButton2 = new Image;
	logo1 = new Image;
	logo2 = new Image;
if (document.images) {
	PrintButton1.src = "images/print1.png"
	PrintButton2.src = "images/print2.png"
	logo1.src = "images/logo1.png"
	logo2.src = "images/logo2.png"
}


		var imgArray = new Array(
			'image1lg.jpg',
			'image2lg.jpg',
			'image3lg.jpg',
			'image4lg.jpg'
			

		);


		var titleArray = new Array(
			'Dog Performing a Trick',
			'Two Dogs',
			'Dog and Two Boys Portrait',
			'Woman and Dog'
			
		);
			
		var imgPath = "images/";
		
		function swapImage(imgID) {

			var theImage = document.getElementById('theImage');
			var textDiv = document.getElementById('bottomText');

			var newImg;
			var textTitle;

			newImg = imgArray[imgID];
			theImage.src = imgPath + newImg;

			textTitle=titleArray[imgID];

      			textDiv.innerHTML = textTitle;
		}
			
		function preloadImages() {		
			for(var i = 0; i < imgArray.length; i++) {
				var tmpImg = new Image;
				tmpImg.src = imgPath + imgArray[i];
			}
		}
		

</script>


</head>
<body  onload="preloadImages()">

<div align="center">

<div>
	<a href="" onMouseOver="document.PrintButton.src=PrintButton2.src;"
	onMouseOut="document.PrintButton.src=PrintButton1.src;">

	<img src="images/print1.png" width="250" height="100" 
	name="PrintButton" alt="PrintButton" style="border:none;"/>

	</a>
</div>


<div id="logo">
	<a href="logo.html" onMouseOver="document.logo.src=logo2.src;"
	onMouseOut="document.logo.src=logo1.src;">

	<img src="images/logo1.png" width="133" height="126" 
	name="logo" alt="logo" style="border:none;"/>

	</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
		<img src="images/Thumbnails/image1sm.jpg"  alt="Dog doing Trick" onmouseover="swapImage(0);" />
		<img src="images/Thumbnails/image2sm.jpg"  alt="Two hunting Dogs" onmouseover="swapImage(1);" />
		<img src="images/Thumbnails/image3sm.jpg"  alt="Dog and two kids" onmouseover="swapImage(2);" />
		<img src="images/Thumbnails/image4sm.jpg"  alt="Woman and Dog" onmouseover="swapImage(3);" />
		
</div>

	<div id="image">

		<img id="theImage" src="images/image1lg.jpg" alt="Dog doing trick" />
		<h3 id="bottomText">Dog doing trick</h3>
	</div>

<img src="images/2colback.jpg" alt="Background" />

<br />
<br />
<br />
<br />



</div>

<p>
    <a href="http://validator.w3.org/check?uri=referer"><img
      src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional" height="31" width="88" /></a>
</p>
  

</body>
</html>
